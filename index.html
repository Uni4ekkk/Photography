<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Danyii's Photos</title>

<style>

body {
    margin: 0;
    padding: 20px;
    background: #0f1115;
    font-family: "Trebuchet MS", sans-serif;
    color: white;
}

/* TOP 4 PHOTOS */
.top-gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-bottom: 30px;
}

.top-gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.2s;
}

.top-gallery img:hover {
    transform: scale(1.03);
}

/* MAIN GALLERY */
.photo-columns {
    display: flex;
    gap: 20px;
}

.gallery {
    flex: 1;
    height: 600px;
    overflow-y: auto;

    border: 1px solid #2f3b55;
    border-radius: 15px;

    padding: 10px;

    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

.gallery h2 {
    grid-column: span 2;
    text-align: center;
    color: #8ab4ff;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* FULLSCREEN */
#fullscreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.8);

    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#fullscreen img {
    max-width: 85%;
    max-height: 80%;
    border-radius: 15px;
}

/* ARROWS */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 50px;
    color: white;
    cursor: pointer;
    user-select: none;
    padding: 10px;
}

.left { left: 30px; }
.right { right: 30px; }

/* INSTAGRAM */
.insta {
    text-align: center;
    margin-top: 40px;
}

.insta a {
    color: #8ab4ff;
    font-size: 20px;
    text-decoration: none;
    border: 1px solid #8ab4ff;
    padding: 10px 25px;
    border-radius: 10px;
    transition: 0.2s;
}

.insta a:hover {
    background: #8ab4ff;
    color: black;
}

</style>
</head>

<body>

<!-- TOP 4 BEST PHOTOS -->
<div class="top-gallery">
    <img src="photos/A pine tree - S23U-1.jpg">
    <img src="photos/Blossom flowers - S23U.jpg">
    <img src="photos/A tavern - Sony a 7 R iii-1.jpg">
    <img src="photos/Mirror  1 - Sony a 7 R iii-1.jpg">
</div>

<!-- MAIN GALLERY -->
<div class="photo-columns">

    <div class="gallery">
        <h2>Phone</h2>

        <img src="photos/A pine tree - S23U-1.jpg">
        <img src="photos/Flowers over a lamp - A54.jpg">
        <img src="photos/A flat house - S23U-1.jpg">
        <img src="photos/Beautiful treee shot llanes - S23U-1.jpg">
    </div>

    <div class="gallery">
        <h2>Camera</h2>

        <img src="photos/A tavern - Sony a 7 R iii-1.jpg">
        <img src="photos/A lonely treel- Sony a 7 R iii-1.jpg">
        <img src="photos/Mirror  1 - Sony a 7 R iii-1.jpg">
        <img src="photos/Mirror  2 - Sony a 7 R iii-1.jpg">
    </div>

</div>

<!-- FULLSCREEN VIEW -->
<div id="fullscreen">
    <div class="arrow left">&#10094;</div>
    <img id="full-img">
    <div class="arrow right">&#10095;</div>
</div>

<!-- INSTAGRAM -->
<div class="insta">
    <p>More photos here:</p>
    <a href="https://www.instagram.com/danyii_ii" target="_blank">
        @danyii_ii
    </a>
</div>

<script>

const images = document.querySelectorAll("img");
const fullscreen = document.getElementById("fullscreen");
const fullImg = document.getElementById("full-img");

let currentIndex = 0;
let imgArray = [];

images.forEach((img, index) => {
    imgArray.push(img.src);

    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
    });
});

function showImage() {
    fullscreen.style.display = "flex";
    fullImg.src = imgArray[currentIndex];
}

document.querySelector(".left").onclick = () => {
    currentIndex--;
    if (currentIndex < 0) currentIndex = imgArray.length - 1;
    showImage();
};

document.querySelector(".right").onclick = () => {
    currentIndex++;
    if (currentIndex >= imgArray.length) currentIndex = 0;
    showImage();
};

fullscreen.addEventListener("click", (e) => {
    if (e.target === fullscreen) {
        fullscreen.style.display = "none";
    }
});

</script>

</body>
</html>
