<style>

body {
    margin: 0;
    background: white;
    font-family: "Trebuchet MS", sans-serif;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 60px 0;
}

h1 {
    text-align: center;
    margin-bottom: 70px;
}

/* 🔥 TOP GALLERY (тепер фото підлаштовуються) */
.top-gallery {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 25px;
    margin-bottom: 80px;
}

/* ГОЛОВНЕ */
.top-gallery img {
    width: 100%;
    height: auto; /* 🔥 тепер форма від фото */
    display: block;
    border: 3px solid black;
    cursor: pointer;
}

/* ❌ більше не потрібно */
.big, .tall, .wide, .square {
    grid-row: auto;
}

/* 🔥 MASONRY */
.gallery {
    column-count: 3;
    column-gap: 40px;
}

.gallery img {
    width: 100%;
    margin-bottom: 40px;
    display: block;
    break-inside: avoid;
    cursor: pointer;
}

/* FULLSCREEN */
#fullscreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

#fullscreen img {
    max-width: 90%;
    max-height: 90%;
}

/* ARROWS */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 60px;
    color: white;
    cursor: pointer;
}

.left { left: 40px; }
.right { right: 40px; }

/* INSTAGRAM */
.insta {
    position: fixed;
    right: 30px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
}

.insta a {
    text-decoration: none;
    color: black;
    border-bottom: 2px solid black;
    font-size: 18px;
}

</style>
</head>

<script>

const images = document.querySelectorAll("img");
const fullscreen = document.getElementById("fullscreen");
const fullImg = document.getElementById("full-img");

let currentIndex = 0;
let imgArray = [];

images.forEach((img, index) => {
    imgArray.push(img.src);

    img.addEventListener("click", () => {
        currentIndex = index;
        fullscreen.style.display = "flex";
        fullImg.src = imgArray[currentIndex];
    });
});

document.querySelector(".left").onclick = () => {
    currentIndex = (currentIndex - 1 + imgArray.length) % imgArray.length;
    fullImg.src = imgArray[currentIndex];
};

document.querySelector(".right").onclick = () => {
    currentIndex = (currentIndex + 1) % imgArray.length;
    fullImg.src = imgArray[currentIndex];
};

fullscreen.addEventListener("click", (e) => {
    if (e.target === fullscreen) {
        fullscreen.style.display = "none";
    }
});

</script>
