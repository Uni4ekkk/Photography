<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Danyii's Photos</title>

<style>

body {
    margin: 0;
    padding: 40px 80px;
    background: white;
    font-family: "Trebuchet MS", sans-serif;
    color: black;
}

/* TITLE */
h1 {
    text-align: center;
    margin-bottom: 40px;
}

/* TOP 4 */
.top-gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 50px;
}

.top-gallery img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.top-gallery img:hover {
    transform: scale(1.02);
}

/* MASONRY */
.photo-columns {
    display: flex;
    gap: 40px;
}

.gallery {
    flex: 1;
    column-count: 2;
    column-gap: 20px;
}

.gallery h2 {
    column-span: all;
    text-align: center;
    margin-bottom: 20px;
}

.gallery img {
    width: 100%;
    margin-bottom: 20px;
    border-radius: 12px;
    display: block;
    break-inside: avoid;
    cursor: pointer;
    transition: 0.25s;
}

.gallery img:hover {
    transform: scale(1.1);
    filter: brightness(1.05);
}

/* FULLSCREEN */
#fullscreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
}

#fullscreen img {
    max-width: 85%;
    max-height: 85%;
    border-radius: 15px;
}

/* ARROWS */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 60px;
    color: white;
    cursor: pointer;
    padding: 20px;
}

.left { left: 40px; }
.right { right: 40px; }

/* INSTAGRAM */
.insta {
    text-align: center;
    margin-top: 60px;
}

.insta a {
    text-decoration: none;
    color: black;
    border-bottom: 2px solid black;
    font-size: 18px;
    transition: 0.2s;
}

.insta a:hover {
    color: #3b82f6;
    border-color: #3b82f6;
}

</style>
</head>

<body>

<h1>Recent Work</h1>

<!-- TOP 4 -->
<div class="top-gallery">
    <img src="photos/A pine tree - S23U-1.jpg">
    <img src="photos/Blossom flowers - S23U.jpg">
    <img src="photos/A tavern - Sony a 7 R iii-1.jpg">
    <img src="photos/Mirror  1 - Sony a 7 R iii-1.jpg">
</div>

<!-- MAIN -->
<div class="photo-columns">

    <div class="gallery">
        <h2>Phone</h2>

        <img src="photos/A pine tree - S23U-1.jpg">
        <img src="photos/Flowers over a lamp - A54.jpg">
        <img src="photos/A flat house - S23U-1.jpg">
        <img src="photos/Beautiful treee shot llanes - S23U-1.jpg">
        <img src="photos/Cherry blossom flowers - S23U.jpg">
        <img src="photos/Llanes beach ocean view- S23U-1.jpg">
    </div>

    <div class="gallery">
        <h2>Camera</h2>

        <img src="photos/A tavern - Sony a 7 R iii-1.jpg">
        <img src="photos/A lonely treel- Sony a 7 R iii-1.jpg">
        <img src="photos/Mirror  1 - Sony a 7 R iii-1.jpg">
        <img src="photos/Mirror  2 - Sony a 7 R iii-1.jpg">
        <img src="photos/A tunnel with lights in it -  Sony a 7 R iii-1.jpg">
    </div>

</div>

<!-- FULLSCREEN -->
<div id="fullscreen">
    <div class="arrow left">&#10094;</div>
    <img id="full-img">
    <div class="arrow right">&#10095;</div>
</div>

<!-- INSTAGRAM -->
<div class="insta">
    <p>More on Instagram</p>
    <a href="https://www.instagram.com/danyii_ii" target="_blank">
        @danyii_ii
    </a>
</div>

<script>

const images = document.querySelectorAll("img");
const fullscreen = document.getElementById("fullscreen");
const fullImg = document.getElementById("full-img");

let currentIndex = 0;
let imgArray = [];

images.forEach((img, index) => {
    imgArray.push(img.src);

    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
    });
});

function showImage() {
    fullscreen.style.display = "flex";
    fullImg.src = imgArray[currentIndex];
}

document.querySelector(".left").onclick = () => {
    currentIndex = (currentIndex - 1 + imgArray.length) % imgArray.length;
    showImage();
};

document.querySelector(".right").onclick = () => {
    currentIndex = (currentIndex + 1) % imgArray.length;
    showImage();
};

fullscreen.addEventListener("click", (e) => {
    if (e.target === fullscreen) {
        fullscreen.style.display = "none";
    }
});

</script>

</body>
</html>
