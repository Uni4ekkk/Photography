<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Danyii's Photos</title>

<style>

body {
    margin: 0;
    background: white;
    font-family: "Trebuchet MS", sans-serif;
}

/* CENTER CONTENT */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 40px 0;
}

/* TITLE */
h1 {
    text-align: center;
    margin-bottom: 50px;
    letter-spacing: 2px;
}

/* TOP 4 */
.top-gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    margin-bottom: 60px;
}

.top-gallery img {
    width: 100%;
    height: 320px;
    object-fit: cover;

    /* SHARP EDGES */
    border-radius: 0;

    /* CONTRAST STYLE */
    border: 3px solid black;
    filter: contrast(1.1);

    cursor: pointer;
    transition: 0.3s;
}

.top-gallery img:hover {
    transform: scale(1.02);
}

/* MASONRY 3 COL */
.gallery {
    column-count: 3;
    column-gap: 30px;
}

.gallery img {
    width: 100%;
    margin-bottom: 30px;

    border-radius: 0;
    break-inside: avoid;

    cursor: pointer;
    transition: 0.25s;
}

.gallery img:hover {
    transform: scale(1.02);
    filter: brightness(1.05);
}

/* FULLSCREEN */
#fullscreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

#fullscreen img {
    max-width: 90%;
    max-height: 90%;
}

/* ARROWS */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 60px;
    color: white;
    cursor: pointer;
    padding: 20px;
}

.left { left: 50px; }
.right { right: 50px; }

/* SIDE SPACE (future links area) */
.side-left, .side-right {
    position: fixed;
    top: 0;
    width: 180px;
    height: 100%;
    pointer-events: none;
}

/* INSTAGRAM */
.insta {
    text-align: center;
    margin-top: 80px;
}

.insta a {
    text-decoration: none;
    color: black;
    border-bottom: 2px solid black;
    font-size: 18px;
}

.insta a:hover {
    color: #3b82f6;
    border-color: #3b82f6;
}

</style>
</head>

<body>

<div class="side-left"></div>
<div class="side-right"></div>

<div class="container">

<h1>RECENT WORK</h1>

<!-- TOP 4 -->
<div class="top-gallery">
    <img src="photos/A pine tree - S23U-1.jpg">
    <img src="photos/Blossom flowers - S23U.jpg">
    <img src="photos/A tavern - Sony a 7 R iii-1.jpg">
    <img src="photos/Mirror 1 - Sony a 7 R iii-1.jpg">
</div>

<!-- ALL PHOTOS -->
<div class="gallery">

<img src="photos/A pine tree - S23U-1.jpg">
<img src="photos/Flowers over a lamp - A54.jpg">
<img src="photos/A flat house - S23U-1.jpg">
<img src="photos/Beautiful treee shot llanes - S23U-1.jpg">
<img src="photos/Cherry blossom flowers - S23U.jpg">
<img src="photos/Llanes beach ocean view- S23U-1.jpg">

<img src="photos/A tavern - Sony a 7 R iii-1.jpg">
<img src="photos/A lonely treel- Sony a 7 R iii-1.jpg">
<img src="photos/Mirror 1 - Sony a 7 R iii-1.jpg">
<img src="photos/Mirror 2 - Sony a 7 R iii-1.jpg">
<img src="photos/A tunnel with lights in it - Sony a 7 R iii-1.jpg">

</div>

<!-- FULLSCREEN -->
<div id="fullscreen">
    <div class="arrow left">&#10094;</div>
    <img id="full-img">
    <div class="arrow right">&#10095;</div>
</div>

<!-- INSTAGRAM -->
<div class="insta">
    <p>More on Instagram</p>
    <a href="https://www.instagram.com/danyii_ii" target="_blank">
        @danyii_ii
    </a>
</div>

</div>

<script>

const images = document.querySelectorAll("img");
const fullscreen = document.getElementById("fullscreen");
const fullImg = document.getElementById("full-img");

let currentIndex = 0;
let imgArray = [];

images.forEach((img, index) => {
    imgArray.push(img.src);

    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
    });
});

function showImage() {
    fullscreen.style.display = "flex";
    fullImg.src = imgArray[currentIndex];
}

document.querySelector(".left").onclick = () => {
    currentIndex = (currentIndex - 1 + imgArray.length) % imgArray.length;
    showImage();
};

document.querySelector(".right").onclick = () => {
    currentIndex = (currentIndex + 1) % imgArray.length;
    showImage();
};

fullscreen.addEventListener("click", (e) => {
    if (e.target === fullscreen) {
        fullscreen.style.display = "none";
    }
});

</script>

</body>
</html>
