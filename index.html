<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Danyii's Photos</title>

<style>

body {
    margin: 0;
    background: white;
    font-family: "Trebuchet MS", sans-serif;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 60px 0;
}

h1 {
    text-align: center;
    margin-bottom: 70px;
}

/* TOP GRID */
.top-gallery {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    grid-auto-rows: 220px;
    gap: 25px;
    margin-bottom: 80px;
}

.top-gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border: 3px solid black;
    cursor: pointer;
}

/* shapes */
.big { grid-row: span 2; }
.tall { grid-row: span 2; }
.wide {}
.square {}

/* MASONRY */
.gallery {
    column-count: 3;
    column-gap: 40px;
}

.gallery img {
    width: 100%;
    margin-bottom: 40px;
    display: block;
    break-inside: avoid;
    cursor: pointer;
}

/* FULLSCREEN */
#fullscreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

#fullscreen img {
    max-width: 90%;
    max-height: 90%;
}

/* ARROWS */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 60px;
    color: white;
    cursor: pointer;
}

.left { left: 40px; }
.right { right: 40px; }

/* INSTAGRAM RIGHT */
.insta {
    position: fixed;
    right: 30px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
}

.insta a {
    text-decoration: none;
    color: black;
    border-bottom: 2px solid black;
    font-size: 18px;
}

</style>
</head>

<body>

<div class="container">

<h1>BEST SHOTS</h1>

<div class="top-gallery">
    <img class="big" src="photos/A pine tree - S23U-1.jpg">
    <img class="wide" src="photos/Blossom flowers - S23U.jpg">
    <img class="square" src="photos/A tavern - Sony a 7 R iii-1.jpg">
    <img class="tall" src="photos/Mirror 1 - Sony a 7 R iii-1.jpg">
</div>

<h1>ALL OF MY PHOTOS</h1>

<div class="gallery">

<img src="photos/A pine tree - S23U-1.jpg">
<img src="photos/Flowers over a lamp - A54.jpg">
<img src="photos/A flat house - S23U-1.jpg">
<img src="photos/Beautiful treee shot llanes - S23U-1.jpg">
<img src="photos/Cherry blossom flowers - S23U.jpg">
<img src="photos/Llanes beach ocean view- S23U-1.jpg">

<img src="photos/A tavern - Sony a 7 R iii-1.jpg">
<img src="photos/A lonely treel- Sony a 7 R iii-1.jpg">
<img src="photos/Mirror 1 - Sony a 7 R iii-1.jpg">
<img src="photos/Mirror 2 - Sony a 7 R iii-1.jpg">
<img src="photos/A tunnel with lights in it - Sony a 7 R iii-1.jpg">

</div>

</div>

<div id="fullscreen">
    <div class="arrow left">&#10094;</div>
    <img id="full-img">
    <div class="arrow right">&#10095;</div>
</div>

<div class="insta">
    <a href="https://www.instagram.com/danyii_ii" target="_blank">
        @danyii_ii
    </a>
</div>

<script>

const images = document.querySelectorAll("img");
const fullscreen = document.getElementById("fullscreen");
const fullImg = document.getElementById("full-img");

let currentIndex = 0;
let imgArray = [];

images.forEach((img, index) => {
    imgArray.push(img.src);

    img.addEventListener("click", () => {
        currentIndex = index;
        fullscreen.style.display = "flex";
        fullImg.src = imgArray[currentIndex];
    });
});

document.querySelector(".left").onclick = () => {
    currentIndex = (currentIndex - 1 + imgArray.length) % imgArray.length;
    fullImg.src = imgArray[currentIndex];
};

document.querySelector(".right").onclick = () => {
    currentIndex = (currentIndex + 1) % imgArray.length;
    fullImg.src = imgArray[currentIndex];
};

fullscreen.addEventListener("click", (e) => {
    if (e.target === fullscreen) {
        fullscreen.style.display = "none";
    }
});

</script>

</body>
</html>
