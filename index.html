<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Danyii's Photos</title>

<style>

body {
    margin: 0;
    padding: 30px;
    background-color: rgb(39, 40, 43);
    font-family: "Trebuchet MS", sans-serif;
}


.insta-link {
    display: inline-block;
    position: absolute, right;

    font-size: 40px;
    text-decoration: none;
    color: white;

    border: 2px solid rgb(247, 249, 252);
    border-radius: 15px;

    padding: 20px 40px;
    margin-bottom: 10px;

    transition: 0.2s;
}

.insta-link:hover {
    color: rgb(203, 195, 227);
    border-color: rgb(175, 136, 181);
}


.text_insta_location {
    font-size: 30px;
    color: rgb(250, 250, 250);
    text-align: left;
    margin: 0 30px 5px 0;
}


.photo-columns {
    display: flex;
    gap: 30px;
}


.gallery {
    flex: 1;
    height: 700px;

    overflow-y: auto;

    border: 2px solid rgb(247, 249, 252);
    border-radius: 15px;

    padding: 15px;

    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.gallery h2 {
    grid-column: span 4;
    color: white;
    text-align: center;
    margin: 0 0 10px 0;
}


.gallery img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.gallery img:hover {
    transform: scale(1.05);
}


#fullscreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.5);

    display: none;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
}

#fullscreen img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 15px;
}

</style>
</head>

<body>

<p class="text_insta_location">
    All of my photos are here, in Instagram
</p>

<a href="https://www.instagram.com/danyii_ii"
   target="_blank"
   class="insta-link">
   My Insta
</a>

<div class="photo-columns">

    <div class="gallery">
        <h2>Phone Photography</h2>

        <img src="photos/A pine tree - S23U-1.jpg">
        <img src="photos/Flowers over a lamp - A54.jpg">
        <img src="photos/A flat house - S23U-1.jpg">
        <img src="photos/A road leeding into the mystery - Sony a 7 R iii-1.jpg">
        <img src="photos/Beautiful treee shot llanes - S23U-1.jpg">
        <img src="photos/Blossom flowers - S23U.jpg">
        <img src="photos/Car next to a mountain view - S23U-1.jpg">
        <img src="photos/Cherry blossom flowers - S23U.jpg">
        <img src="photos/House popping out between others - S23U-1.jpg">
        <img src="photos/Lamp in between Wisteria - A54.jpg">
        <img src="photos/Llanes beach ocean view composition- S23U-1.jpg">
        <img src="photos/Llanes beach ocean view- S23U-1.jpg">
        
        
        
    </div>

    <div class="gallery">
        <h2>Professional Camera Photography</h2>

        <img src="photos/A little church framed between trees - Sony a 7 R iii-1.jpg">
        <img src="photos/A tavern - Sony a 7 R iii-1.jpg">
        <img src="photos/A lonely treel- Sony a 7 R iii-1.jpg">
        <img src="photos/A road leeding into the mystery - Sony a 7 R iii-1.jpg">
        <img src="photos/Mirror like a portal- Sony a 7 R iii-1.jpg">
        
        
        
    </div>

</div>


<div id="fullscreen">
    <img id="full-img">
</div>

<script>

const images = document.querySelectorAll(".gallery img");
const fullscreen = document.getElementById("fullscreen");
const fullImg = document.getElementById("full-img");

images.forEach(img => {
    img.addEventListener("click", () => {
        fullscreen.style.display = "flex";
        fullImg.src = img.src;
    });
});

fullscreen.addEventListener("click", () => {
    fullscreen.style.display = "none";
});

</script>

</body>
</html>
