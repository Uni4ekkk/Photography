<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Danyii's Photos</title>

<style>

body {
    margin: 0;
    padding: 30px;
    background-color: rgb(39, 40, 43);
    font-family: "Trebuchet MS", sans-serif;
}

/* Instagram button */
.insta-link {
    display: inline-block;

    font-size: 40px;
    text-decoration: none;
    color: white;

    border: 2px solid rgb(247, 249, 252);
    border-radius: 15px;

    padding: 15px 30px;
    margin-bottom: 40px;

    transition: 0.2s;
}

.insta-link:hover {
    color: rgb(203, 195, 227);
    border-color: rgb(175, 136, 181);
}

/* Two columns */
.photo-columns {
    display: flex;
    gap: 30px;
}

/* Scrollable containers */
.gallery {
    flex: 1;
    height: 700px;

    overflow-y: auto;

    border: 2px solid rgb(247, 249, 252);
    border-radius: 15px;

    padding: 15px;
}

/* Gallery titles */
.gallery h2 {
    color: white;
    text-align: center;
    margin-top: 0;
}

/* Images */
.gallery img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 25px;
}

</style>
</head>

<body>

<a
    href="https://www.instagram.com/danyii_ii"
    target="_blank"
    class="insta-link"
>
    My Insta
</a>

<div class="photo-columns">

    <div class="gallery">
        <h2>Phone Photography</h2>

        <img src="A pine tree - S23U-1.jpg" alt="Phone photo">
        <img src=Flowers over a lamp - A54.jpg" alt="Phone photo">
        <img src="phone3.jpg" alt="Phone photo">
    </div>

    <div class="gallery">
        <h2>Professional Camera Photography</h2>

        <img src="A little church framed between trees - Sony a 7 R iii-1.jpg" alt="Camera photo">
        <img src="A tavern - Sony a 7 R iii-1.jpg" alt="Camera photo">
        <img src="Mirror like a portal- Sony a 7 R iii-1.jpg" alt="Camera photo">
    </div>

</div>

</body>
</html>
